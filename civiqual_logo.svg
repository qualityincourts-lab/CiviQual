<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
    <!-- WATSON Icon - Quality in Courts Branding -->
    <!-- 4-Up Chart representing statistical analysis tools -->
    <!-- Colors: Burgundy #6d132a, Gold #dcad73, Sky Blue #56B4E9 -->
    <!-- Copyright (c) 2025 A Step in the Right Direction LLC -->
    
    <!-- Gold outer border -->
    <rect x="0" y="0" width="120" height="120" rx="4" fill="#dcad73"/>
    
    <!-- Inner white background -->
    <rect x="4" y="4" width="112" height="112" rx="2" fill="white"/>
    
    <!-- Four quadrants with burgundy background -->
    <rect x="6" y="6" width="52" height="52" fill="#6d132a"/>
    <rect x="62" y="6" width="52" height="52" fill="#6d132a"/>
    <rect x="6" y="62" width="52" height="52" fill="#6d132a"/>
    <rect x="62" y="62" width="52" height="52" fill="#6d132a"/>
    
    <!-- Gold dividing lines -->
    <line x1="60" y1="4" x2="60" y2="116" stroke="#dcad73" stroke-width="4"/>
    <line x1="4" y1="60" x2="116" y2="60" stroke="#dcad73" stroke-width="4"/>
    
    <!-- Upper Left: Bar Chart with trend line -->
    <rect x="16" y="38" width="8" height="16" fill="white"/>
    <rect x="28" y="30" width="8" height="24" fill="white"/>
    <rect x="40" y="18" width="8" height="36" fill="white"/>
    <line x1="14" y1="50" x2="50" y2="20" stroke="#dcad73" stroke-width="2"/>
    
    <!-- Upper Right: Control Chart / Time Series -->
    <polyline points="70,40 80,28 90,35 100,22 110,30" 
              stroke="white" stroke-width="2.5" fill="none"/>
    <circle cx="70" cy="40" r="3" fill="white"/>
    <circle cx="80" cy="28" r="3" fill="white"/>
    <circle cx="90" cy="35" r="3" fill="white"/>
    <circle cx="100" cy="22" r="3" fill="white"/>
    <circle cx="110" cy="30" r="3" fill="white"/>
    <line x1="66" y1="32" x2="114" y2="32" stroke="#dcad73" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- Lower Left: Histogram with Bell Curve -->
    <rect x="14" y="100" width="6" height="8" fill="#dcad73"/>
    <rect x="22" y="92" width="6" height="16" fill="#dcad73"/>
    <rect x="30" y="78" width="6" height="30" fill="#dcad73"/>
    <rect x="38" y="88" width="6" height="20" fill="#dcad73"/>
    <rect x="46" y="96" width="6" height="12" fill="#dcad73"/>
    <path d="M 12 108 Q 17 105 22 95 Q 30 72 35 72 Q 40 72 48 95 Q 52 105 56 108" 
          stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Lower Right: Scatter Plot with Regression -->
    <circle cx="72" cy="105" r="3" fill="#dcad73"/>
    <circle cx="80" cy="98" r="3" fill="#dcad73"/>
    <circle cx="85" cy="88" r="3" fill="#dcad73"/>
    <circle cx="95" cy="82" r="3" fill="#dcad73"/>
    <circle cx="102" cy="78" r="3" fill="#dcad73"/>
    <circle cx="110" cy="72" r="3" fill="#dcad73"/>
    <line x1="68" y1="108" x2="114" y2="68" stroke="white" stroke-width="2"/>
</svg>
