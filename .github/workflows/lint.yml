name: "Lint Python"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install flake8 pylint

    - name: Run Flake8
      run: flake8 *.py --count --show-source --statistics

    - name: Run Pylint
      run: pylint *.py --exit-zero --output-format=text
